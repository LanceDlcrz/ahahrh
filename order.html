<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Payment</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

header {
    background: #020617;
    padding: 15px;
    text-align: center;
}

header h1 {
    color: #38bdf8;
}
nav a {
            color: #e2e8f0;
            margin-left: 20px;
            text-decoration: none;
        }
        
nav a:hover {
            color: #38bdf8;
        }

.container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.box {
    background: #020617;
    padding: 30px 20px;
    border-radius: 12px;
    text-align: center;
    max-width: 400px;
    width: 100%;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.box h2 {
    color: #38bdf8;
    margin-bottom: 20px;
}

.box p {
    font-size: 1.1em;
    margin: 10px 0;
}

input {
    width: 80%;
    max-width: 300px;
    padding: 10px;
    margin: 10px 0;
    border: none;
    border-radius: 5px;
    background: #0f172a;
    color: #e2e8f0;
    font-size: 1em;
}

button {
    padding: 12px 25px;
    background: #38bdf8;
    color: #020617;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 15px;
}

button:hover {
    background: #0ea5e9;
}

footer {
    text-align: center;
    padding: 15px;
    background: #020617;
    color: #64748b;
}
</style>
</head>
<body>

<header>
    <h1>Paniki Gadgets</h1>
    <nav style="text-decoration: none;">
        <a href="index.html">Home</a>
       
    </nav>
</header>

<div class="container">
    <div class="box">
        <h2>Order Payment</h2>
        <input type="text" placeholder="Bank Name / GCash" required>
        <input type="text" placeholder="Account Number" required>
        <input type="text" placeholder="Account Name" required>

        <button>Confirm Payment</button>
    </div>
</div>

<footer>
    <p>Justin Bumatay • Jonathan Maristela • Lance Allen Dela Cruz. All rights reserved.</p>
</footer>

</body>
</html>
